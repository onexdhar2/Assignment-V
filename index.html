<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>
    <!-- daisy uui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font added -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- cdn -->
    <!-- css added -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="google-font">
    <!-- login form -->
    <section class="flex justify-center items-center h-screen">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4"
      >
        <img class="mx-auto" src="./assets/github-logo.png" alt="" />
        <h1 class="text-center font-semibold text-2xl">
          GitHub Issues Tracker
        </h1>
        <p class="text-center text-[#64748B] text-[16px]">
          Sign in to manage your issues
        </p>
        <label class="label text-black text-[16px]">Username</label>
        <input id="input-name" type="email" class="input" placeholder="Enter Username" />
        <p class="text-blue-700">Default: admin</p>

        <label class="label text-black text-[16px]">Password</label>
        <input id="input-password" type="password" class="input" placeholder="Enter Password" />
        <p class="text-blue-700">Default: admin123</p>
        <!-- sign-button -->
        <button id="sign-button" class="btn btn-primary mt-4">Sign In</button>
        <!-- horizental or -->
        <div class="flex items-center justify-center gap-3">
          <hr class="w-28 text-[#64748B]" />
          <p class="text-[16px]">OR</p>
          <hr class="w-28 text-[#64748B]" />
        </div>
        <!-- horizental or -->
        <p class="text-center text-[14px] text-[#64748B]">Demo Credentials:</p>
      </fieldset>
    </section>
    <!-- login form -->
    <!-- script added -->
    <script src="./login.js"></script>
  </body>
</html>
